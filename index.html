let correctCount = 0;
let totalCount = 0;
let remainingQuestions = [];

function shuffle(array) {
  return array.sort(() => Math.random() - 0.5);
}

function loadQuestion() {

  if (remainingQuestions.length === 0) {
    endGame();
    return;
  }

  const randomIndex = Math.floor(Math.random() * remainingQuestions.length);
  const q = remainingQuestions.splice(randomIndex, 1)[0]; // delete q from list

  const sentenceEl = document.getElementById("sentence");
  const translationEl = document.getElementById("translation");
  const answersEl = document.getElementById("answers");

  sentenceEl.innerHTML = q[0];
  translationEl.innerText = q[1];
  answersEl.innerHTML = "";

  const correctAnswer = q[2];
  const options = shuffle([q[2], q[3], q[4]]);

  options.forEach(option => {
    const btn = document.createElement("button");
    btn.innerText = option;
    btn.onclick = () => checkAnswer(option, correctAnswer, q[0]);
    answersEl.appendChild(btn);
  });
}

function checkAnswer(selected, correct, sentenceTemplate) {
  const sentenceEl = document.getElementById("sentence");
  const answersEl = document.getElementById("answers");

  totalCount++;

  if (selected === correct) {
    correctCount++;
    sentenceEl.innerHTML = sentenceTemplate.replace("____", `<span class="correct">${selected}</span>`);
  } else {
    sentenceEl.innerHTML = sentenceTemplate.replace("____", `<span class="wrong">${correct}</span>`);
  }

  answersEl.innerHTML = "";

  updateScore();

  if (selected === correct) {
      setTimeout(loadQuestion, 900);  // timeout when right
  } else {
      setTimeout(loadQuestion, 2000); // timeout when wrong
  }
}

function updateScore() {
  const scoreEl = document.getElementById("score");
  const percentage = totalCount === 0 ? 0 : Math.round((correctCount / totalCount) * 100);
  scoreEl.innerText = `Precisione: ${percentage}%`;
}

function endGame() {
  const sentenceEl = document.getElementById("sentence");
  const translationEl = document.getElementById("translation");
  const answersEl = document.getElementById("answers");

  sentenceEl.innerHTML = "LA FINE 🎉";
  translationEl.innerHTML = "";
  answersEl.innerHTML = "";

  const percentage = Math.round((correctCount / totalCount) * 100);
  document.getElementById("score").innerText =
    `Risultato: ${percentage}%`;
}

remainingQuestions = [...questions];
loadQuestion();
